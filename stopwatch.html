<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch App</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
    }

    .container {
        background: rgba(0, 0, 0, 0.4);
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        width: 350px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .time {
        font-size: 40px;
        margin-bottom: 20px;
        letter-spacing: 2px;
    }

    .buttons button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
    }

    .start { background: #28a745; color: white; }
    .pause { background: #ffc107; color: black; }
    .reset { background: #dc3545; color: white; }
    .lap   { background: #17a2b8; color: white; }

    button:hover {
        opacity: 0.8;
        transform: scale(1.05);
    }

    .laps {
        margin-top: 20px;
        max-height: 150px;
        overflow-y: auto;
        text-align: left;
        font-size: 14px;
    }

    .laps div {
        background: rgba(255,255,255,0.1);
        padding: 5px;
        margin: 5px 0;
        border-radius: 5px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Stopwatch</h2>
    <div class="time" id="display">00:00:00</div>

    <div class="buttons">
        <button class="start" onclick="start()">Start</button>
        <button class="pause" onclick="pause()">Pause</button>
        <button class="reset" onclick="reset()">Reset</button>
        <button class="lap" onclick="lap()">Lap</button>
    </div>

    <div class="laps" id="laps"></div>
</div>

<script>
let startTime = 0;
let elapsedTime = 0;
let timerInterval;
let running = false;

function formatTime(time) {
    let date = new Date(time);
    let minutes = String(date.getUTCMinutes()).padStart(2, '0');
    let seconds = String(date.getUTCSeconds()).padStart(2, '0');
    let milliseconds = String(Math.floor(date.getUTCMilliseconds() / 10)).padStart(2, '0');
    return `${minutes}:${seconds}:${milliseconds}`;
}

function start() {
    if (!running) {
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(function () {
            elapsedTime = Date.now() - startTime;
            document.getElementById("display").textContent = formatTime(elapsedTime);
        }, 10);
        running = true;
    }
}

function pause() {
    clearInterval(timerInterval);
    running = false;
}

function reset() {
    clearInterval(timerInterval);
    running = false;
    elapsedTime = 0;
    document.getElementById("display").textContent = "00:00:00";
    document.getElementById("laps").innerHTML = "";
}

function lap() {
    if (running) {
        let lapTime = formatTime(elapsedTime);
        let lapElement = document.createElement("div");
        lapElement.textContent = "Lap: " + lapTime;
        document.getElementById("laps").appendChild(lapElement);
    }
}
</script>

</body>
</html>
